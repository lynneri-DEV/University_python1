<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Менеджер задач</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Список задач</h1>

        <form action="/add" method="POST">
            <input type="text" name="title" placeholder="Что нужно сделать?" required>
            <button type="submit">Добавить</button>
        </form>

        <ul>
            {% for task in tasks %}
            <li>
                <span class="{{ 'done' if task.done else '' }}">
                    {{ task.title }}
                </span>
                <div class="actions">
                    <a href="{{ url_for('complete_task', task_id=task.id) }}">
                        {{ '↩' if task.done else '✔' }}
                    </a>
                    <a href="{{ url_for('delete_task', task_id=task.id) }}" class="del">✖</a>
                </div>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
